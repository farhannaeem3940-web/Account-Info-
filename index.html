<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhan FF Account Info</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff4444 0%, #ff6b35 25%, #f7931e 50%, #ffd23f 75%, #ff4444 100%);
            background-size: 400% 400%;
            animation: freefire-bg 8s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes freefire-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ffd23f;
            border-radius: 25px;
            box-shadow: 0 30px 60px rgba(255, 68, 68, 0.4);
            padding: 50px;
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        .title {
            color: #ffd23f;
            font-size: 3em;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ffd23f;
            font-size: 1.4em;
            margin-bottom: 40px;
        }

        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        #accountId {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            font-weight: 800;
            border: 4px solid #ff4444;
            border-radius: 50px;
            background: white;
            outline: none;
            text-align: center;
        }

        #searchBtn {
            background: linear-gradient(135deg, #ff4444, #ff6b35, #ffd23f);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
        }

        .result, .error {
            margin-top: 40px;
            padding: 30px;
            border-radius: 20px;
            display: none;
            color: white;
        }

        .result {
            background: rgba(0, 255, 0, 0.15);
            border: 3px solid #00ff00;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 3px solid #ff4444;
            color: #ffd23f;
        }

        .show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Farhan FF</h1>
        <h2 class="subtitle">Account Checker</h2>

        <div class="search-box">
            <input type="text" id="accountId" placeholder="925521673" maxlength="9">
        </div>

        <button id="searchBtn">🔥 CHECK ACCOUNT</button>

        <div class="error" id="error">
            ❌ INVALID ID! Only 925521673 works!
        </div>

        <div class="result" id="result">
            <h2>✅ PLAYER FOUND!</h2>
            <p>Name: FᎪᎡᎷᎪΝ X9</p>
            <p>Region: PK</p>
            <p>Level: 57</p>
            <p>Likes: 1806</p>
        </div>
    </div>

    <script>
        const VALID_ID = "925521673";
        const accountInput = document.getElementById('accountId');
        const searchButton = document.getElementById('searchBtn');
        const errorEl = document.getElementById('error');
        const resultEl = document.getElementById('result');

        function checkAccount() {
            const inputValue = accountInput.value.replace(/[^0-9]/g, '').trim();

            errorEl.classList.remove('show');
            resultEl.classList.remove('show');

            if (inputValue === VALID_ID) {
                resultEl.classList.add('show');
            } else {
                errorEl.classList.add('show');
            }
        }

        searchButton.onclick = checkAccount;

        accountInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                checkAccount();
            }
        };
    </script>
    </body>
</html>
